services:

  # Scorpio context broker
  scorpio:
    image: scorpiobroker/all-in-one-runner:java-latest
    hostname: scorpio
    container_name: scorpio
    networks:
        - default
    expose:
        - '9090'
    environment:
      DBHOST: postgres
    ports:
      - "9090:9090"
    depends_on:
      - postgres

  # MongoDB for Orion-LD & iot agent
  mongodb:
    image: mongo:4.4
    container_name: fiware-mongo
    networks:
        - default
    ports:
      - "27017:27017"

  postgres:
    image: postgis/postgis
    ports:
      - "5432"
    environment:
      POSTGRES_USER: ngb
      POSTGRES_PASSWORD: ngb
      POSTGRES_DB: ngb

  mosquitto:
    image: eclipse-mosquitto
    hostname: mosquitto
    container_name: mosquitto
    networks:
        - default
    expose:
        - '1883'
        - '9001'
    ports:
        - '1883:1883'
        - '9001:9001'
    volumes:
        - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  iot-agent:
    image: fiware/iotagent-ul:latest
    hostname: iot-agent
    container_name: fiware-iotagent-ul
    expose:
        - "4041"
        - "7896"
    ports:
      - "4041:4041"
      - "7896:7896"
    environment:
      - IOTA_CB_HOST=scorpio
      - IOTA_CB_PORT=9090
      - IOTA_CB_NGSI_VERSION=ld
      - IOTA_NORTH_HOST=0.0.0.0
      - IOTA_NORTH_PORT=4041
      - IOTA_LOG_LEVEL=DEBUG
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=1883
      - IOTA_HTTP_PORT=7896
      - IOTA_TIMESTAMP=true
      - IOTA_AUTOCAST=true
      - IOTA_DEFAULT_RESOURCE=/iot/json
      - IOTA_TRANSPORT=HTTP
      - IOTA_REGISTRY_TYPE=mongodb
      - IOTA_MONGO_HOST=mongodb
      - IOTA_MONGO_PORT=27017
      - IOTA_MONGO_DB=iotagent
      - IOTA_PROVIDER_URL=http://iot-agent:4041
      - IOTA_UL20_AMQP_BINDING=false
      - IOTA_JSON_LD_CONTEXT=https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context.jsonld
      - IOTA_FALLBACK_TENANT=openiot
      - IOTA_MULTI_CORE=true
    depends_on:
      - mosquitto
      - mongodb
      - scorpio